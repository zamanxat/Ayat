<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5, viewport-fit=cover">
  <title>Айат | Логистика</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="shortcut icon" href="https://i.ibb.co.com/xqrTSq0d/logo2.jpg" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    :root {
      --bg: #fafbfc;
      --card: #ffffff;
      --primary: #1e3a5f;
      --accent: #c2410c;
      --teal: #0d9488;
      --text: #0f172a;
      --muted: #475569;
      --brd: #e2e8f0;
      --radius: 16px;
    }
    img { max-width: 100%; height: auto; }
    [data-lucide] { display: inline-flex; align-items: center; justify-content: center; }
    [data-lucide] svg { width: 100%; height: 100%; flex-shrink: 0; }
    html { overflow-x: hidden; -webkit-overflow-scrolling: touch; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 16px; padding-left: max(16px, env(safe-area-inset-left)); padding-right: max(16px, env(safe-area-inset-right)); padding-bottom: max(100px, calc(80px + env(safe-area-inset-bottom))); overflow-x: hidden; min-height: 100vh; min-height: 100dvh; }
    .header {
      position: sticky; top: 0; z-index: 100;
      background: var(--card);
      box-shadow: 0 1px 2px rgba(0,0,0,.04);
      margin: -16px -16px 16px -16px; padding: 16px;
      border-bottom: 1px solid var(--brd);
    }
    .back { margin-bottom: 16px; }
    .back a { text-decoration: none; color: var(--primary); font-weight: 700; font-size: 14px; display: inline-flex; align-items: center; gap: 8px; padding: 10px 16px; border: 1px solid var(--brd); border-radius: 12px; background: #f8fafc; transition: .2s; }
    .back a:hover { background: rgba(37,99,235,.1); border-color: var(--primary); }
    .back a .lucide { width: 18px; height: 18px; }
    .fab .lucide { width: 22px; height: 22px; }
    .search-box { position: relative; margin-bottom: 14px; }
    .search-box input {
      width: 100%; padding: 14px 14px 14px 46px;
      border: 1px solid var(--brd); border-radius: 14px;
      font-size: 16px; outline: none; box-sizing: border-box;
      background: #fff; color: var(--text); font-family: inherit;
      transition: .2s;
    }
    .search-box input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
    .search-box input::placeholder { color: var(--muted); }
    .search-box .lucide { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--primary); width: 20px; height: 20px; pointer-events: none; }
    .filter-group { display: flex; flex-direction: column; gap: 10px; }
    .filters { display: flex; gap: 8px; overflow-x: auto; padding: 6px 0; scrollbar-width: none; }
    .filters::-webkit-scrollbar { display: none; }
    .chip {
      white-space: nowrap; padding: 9px 18px; border-radius: 20px;
      background: #f8fafc; border: 1px solid var(--brd);
      font-size: 12px; font-weight: 600; color: var(--muted); cursor: pointer;
      font-family: inherit; transition: all .2s;
    }
    .chip.active { background: var(--primary); color: white; border-color: var(--primary); }
    .date-range-picker {
      display: none; gap: 10px; align-items: center;
      background: #f8fafc; padding: 12px; border-radius: 12px;
      margin-top: 6px; border: 1px solid var(--brd);
    }
    .date-range-picker input { border: 1px solid var(--brd); border-radius: 8px; padding: 8px; font-size: 13px; background: #fff; color: var(--text); }
    #container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .card {
      background: var(--card); border-radius: var(--radius);
      padding: 18px; border: 1px solid var(--brd);
      animation: slideIn 0.3s ease-out;
      box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 12px rgba(0,0,0,.04);
    }
    @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .card-title { font-size: 16px; font-weight: 700; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: flex-start; }
    .contact-bar {
      background: rgba(30,58,95,.06); padding: 12px; border-radius: 12px;
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 12px; text-decoration: none; border: 1px solid rgba(30,58,95,.15);
      transition: .2s;
    }
    .contact-bar:hover { background: rgba(30,58,95,.1); }
    .phone-num { font-size: 16px; font-weight: 700; color: var(--primary); }
    .call-icon { width: 38px; height: 38px; background: var(--teal); color: #fff; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
    .call-icon .lucide { width: 18px; height: 18px; }
    .info-item { display: flex; gap: 10px; margin-bottom: 10px; }
    .info-item .lucide { color: var(--accent); width: 18px; height: 18px; flex-shrink: 0; }
    .info-text { font-size: 14px; font-weight: 500; color: var(--muted); }
    .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .btn-action { padding: 10px; border-radius: 10px; border: 1px solid var(--brd); font-weight: 600; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; background: #f8fafc; color: var(--text); text-decoration: none; font-family: inherit; transition: .2s; }
    .btn-action:hover { background: #f1f5f9; border-color: var(--primary); }
    .btn-2gis { color: #818cf8; }
    .btn-copy { color: var(--muted); }
    .cargo-tag { background: rgba(5,150,105,.08); border-radius: 12px; padding: 12px; border-left: 4px solid var(--teal); margin-bottom: 14px; }
    .cargo-name { font-weight: 700; font-size: 14px; color: var(--text); }
    .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    select { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid var(--brd); font-weight: 600; font-size: 13px; background: #fff; color: var(--text); outline: none; font-family: inherit; }
    select:focus { border-color: var(--primary); }
    .fab { position: fixed; bottom: 24px; right: 20px; width: 56px; height: 56px; background: linear-gradient(135deg, var(--primary), #152a47); color: white; border-radius: 50%; border: none; box-shadow: 0 4px 16px rgba(30,58,95,.25); display: flex; align-items: center; justify-content: center; z-index: 1000; cursor: pointer; transition: transform .2s; }
    .fab:hover { transform: scale(1.05); }
    .fab:active { transform: scale(.98); }
    @media(max-width: 620px) {
      #container { grid-template-columns: 1fr; gap: 12px; }
      .card { padding: 14px; }
      .card-title { font-size: 15px; }
    }
    @media(max-width: 480px) {
      body { padding: 12px; padding-bottom: 90px; padding-bottom: calc(90px + env(safe-area-inset-bottom)); }
      .header { padding: 12px; margin: -12px -12px 12px -12px; }
      .search-box input { padding: 12px 12px 12px 42px; font-size: 16px; }
      .chip { padding: 8px 14px; font-size: 11px; }
      .card { padding: 14px; }
      .card-title { font-size: 14px; flex-wrap: wrap; }
      .contact-bar { padding: 10px; }
      .phone-num { font-size: 16px; }
      .btn-group { grid-template-columns: 1fr; }
      .status-grid { grid-template-columns: 1fr; }
      .cargo-tag { padding: 10px; }
      .cargo-name { font-size: 13px; }
      .fab { right: 16px; bottom: calc(20px + env(safe-area-inset-bottom)); }
    }
    @media(max-width: 380px) {
      body { padding: 10px; padding-bottom: calc(80px + env(safe-area-inset-bottom)); }
      .header { padding: 10px; margin: -10px -10px 10px -10px; }
      .search-box input { padding: 10px 10px 10px 38px; font-size: 15px; }
      .chip { padding: 6px 12px; font-size: 10px; }
      .card { padding: 12px; }
      .card-title { font-size: 13px; }
      .info-text { font-size: 13px; }
      .fab { width: 50px; height: 50px; right: 12px; bottom: calc(16px + env(safe-area-inset-bottom)); }
      #container { grid-template-columns: 1fr; min-width: 0; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="back" style="display:flex;flex-wrap:wrap;gap:8px;align-items:center">
      <a href="index.html"><i class="bi bi-arrow-left"></i> Артқа</a>
      <a href="admin.html" id="adminBackBtn" style="display:none;padding:8px 14px;font-size:13px;background:linear-gradient(135deg,var(--primary),#152a47);color:#fff;border-radius:10px;text-decoration:none;font-weight:600;align-items:center;gap:6px"><i class="bi bi-gear-fill"></i> Админ панелге қайту</a>
    </div>
    <script>if(new URLSearchParams(location.search).get('from')==='admin')document.getElementById('adminBackBtn').style.display='inline-flex';</script>
    <div class="search-box" style="margin-top:16px">
      <i class="bi bi-search"></i>
      <input type="text" id="mainSearch" placeholder="Аты, номер (8777...), тауар, адрес..." oninput="filter()">
    </div>
    <div class="filter-group">
      <div class="filters" id="timeFilters">
        <button class="chip active" onclick="applyTimeFilter('Барлығы', this)">Барлығы</button>
        <button class="chip" onclick="applyTimeFilter('Бүгін', this)">Бүгін</button>
        <button class="chip" onclick="applyTimeFilter('Апта', this)">Апта</button>
        <button class="chip" onclick="applyTimeFilter('Ай', this)">Ай</button>
        <button class="chip" onclick="applyTimeFilter('Аралық', this)">Аралық</button>
      </div>
      <div class="date-range-picker" id="customDatePanel">
        <input type="date" id="dateStart" onchange="filter()">
        <span style="color:var(--muted)">—</span>
        <input type="date" id="dateEnd" onchange="filter()">
      </div>
      <div class="filters" id="statusFilters">
        <button class="chip active" onclick="applyStatusFilter('all', this)">Барлығы</button>
        <button class="chip" onclick="applyStatusFilter('Жаңа', this)">Жаңа</button>
        <button class="chip" onclick="applyStatusFilter('Процесте', this)">Процесте</button>
        <button class="chip" onclick="applyStatusFilter('Жолда', this)">Жолда</button>
        <button class="chip" onclick="applyStatusFilter('Қабылданды', this)">Жетті</button>
      </div>
    </div>
  </div>

  <div id="container"></div>

  <button class="fab" onclick="load()"><i class="bi bi-arrow-clockwise"></i></button>

  <script>
    const SB_URL = 'https://jnuokhhqojlurvadcduv.supabase.co';
    const SB_KEY = 'sb_publishable_3l9NjY0Qadv3dJ9x3-t19w_8mKniZBk';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let store = [];
    let deliveryTypes = ['Курьер','Такси','Поезд','Почта'];
    let currentStatus = 'all';
    let currentTimeScope = 'Барлығы';

    try{const _ch=new BroadcastChannel('aiat_site_sync');_ch.onmessage=e=>{if(e.data==='aiat_paydel_updated')load();};}catch(_){}

    async function load() {
      document.getElementById('container').innerHTML = '<div style="text-align:center; padding:50px; color:var(--muted);">Жүктелуде...</div>';
      const [ordersRes, delRes] = await Promise.all([
        supabaseClient.from('aiat_orders').select('*').order('created_at', { ascending: false }),
        supabaseClient.from('aiat_delivery_types').select('name').order('sort_order').then(r => r.data && r.data.length ? r.data.map(d => d.name) : null).catch(() => null)
      ]);
      if (delRes && delRes.length) deliveryTypes = delRes;
      const { data, error } = ordersRes;
      if (!error) {
        store = (data || []).map(o => ({
          ...o,
          status: (o.status === null || o.status === "" || o.status === "null") ? "Жаңа" : o.status
        }));
        filter();
      } else {
        document.getElementById('container').innerHTML = '<div style="text-align:center; padding:50px; color:var(--r);">Жүктеу қатесі. Қайта көріңіз.</div>';
      }
    }

    function applyStatusFilter(status, el) {
      currentStatus = status;
      document.querySelectorAll('#statusFilters .chip').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      filter();
    }

    function applyTimeFilter(scope, el) {
      currentTimeScope = scope;
      document.querySelectorAll('#timeFilters .chip').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('customDatePanel').style.display = (scope === 'Аралық') ? 'flex' : 'none';
      filter();
    }

    function filter() {
      const val = document.getElementById('mainSearch').value.toLowerCase().trim();
      const cleanSearchVal = val.replace(/\D/g, '');
      const now = new Date();
      const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const dayOfWeek = now.getDay();
      const diffToMonday = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
      const startOfWeek = new Date(startOfToday);
      startOfWeek.setDate(startOfToday.getDate() - diffToMonday);
      const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);

      const filtered = store.filter(o => {
        const orderDate = new Date(o.created_at);
        const cleanPhone = (o.client_phone || '').replace(/\D/g, '');
        const searchMatch = !val || (
          (o.client_name?.toLowerCase().includes(val)) ||
          (o.address?.toLowerCase().includes(val)) ||
          (o.product?.toLowerCase().includes(val)) ||
          (o.gift?.toLowerCase().includes(val)) ||
          (cleanPhone.includes(cleanSearchVal) && cleanSearchVal !== '') ||
          (o.client_phone?.includes(val))
        );
        const statusMatch = (currentStatus === 'all') || (o.status === currentStatus);
        let timeMatch = true;
        if (currentTimeScope === 'Бүгін') timeMatch = orderDate >= startOfToday;
        else if (currentTimeScope === 'Апта') timeMatch = orderDate >= startOfWeek;
        else if (currentTimeScope === 'Ай') timeMatch = orderDate >= startOfMonth;
        else if (currentTimeScope === 'Аралық') {
          const s = document.getElementById('dateStart').value;
          const e = document.getElementById('dateEnd').value;
          if (s) timeMatch = timeMatch && (orderDate >= new Date(s));
          if (e) {
            const endLimit = new Date(e);
            endLimit.setHours(23, 59, 59);
            timeMatch = timeMatch && (orderDate <= endLimit);
          }
        }
        return searchMatch && statusMatch && timeMatch;
      });
      render(filtered);
    }

    function render(list) {
      const container = document.getElementById('container');
      if (list.length === 0) {
        container.innerHTML = '<div style="text-align:center; padding:50px; color:var(--muted);">Тапсырыс табылмады</div>';
        return;
      }
      const e2 = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      container.innerHTML = list.map(o => `
        <div class="card">
          <div class="card-title">
            <span style="max-width: 70%;">${e2(o.client_name || 'Аты жоқ')}</span>
            <div style="text-align: right;">
              <div style="font-size:11px; color:var(--primary); font-weight:800;">#${o.id.toString().slice(-4)}</div>
              <small style="font-size:10px; color:var(--muted)">${new Date(o.created_at).toLocaleDateString()}</small>
            </div>
          </div>
          <a href="tel:${o.client_phone}" class="contact-bar">
            <span class="phone-num">${o.client_phone || '—'}</span>
            <div class="call-icon"><i class="bi bi-telephone-fill"></i></div>
          </a>
          <div class="info-item">
            <i class="bi bi-geo-alt-fill"></i>
            <div class="info-text" id="addr_${o.id}">${e2(o.address || '—')}</div>
          </div>
          <div class="btn-group">
            <button class="btn-action btn-copy" onclick="copy('addr_${o.id}', this)">Мекенжайды көшіру</button>
            <a href="https://2gis.kz/search/${encodeURIComponent(o.address || '')}" class="btn-action btn-2gis">2GIS</a>
            ${o.delivery_contact ? `<button class="btn-action btn-copy" data-copy="${e2(String(o.delivery_contact))}" onclick="copyText(this.getAttribute('data-copy'), this)">Такси номерін көшіру</button>` : ''}
          </div>
          <div class="cargo-tag">
            <div class="cargo-name">${e2(o.product || '—')}</div>
            ${o.gift ? `<div style="color:var(--accent); font-size:12px; margin-top:6px; font-weight:700;">${e2(o.gift)}</div>` : ''}
            ${o.product_color ? `<div style="font-size:12px; margin-top:6px; color:var(--primary); font-weight:600;"><i class="bi bi-palette-fill" style="font-size:11px"></i> Түс: ${e2(o.product_color)}</div>` : ''}
            ${o.order_note ? `<div style="font-size:12px; margin-top:6px; color:var(--muted); font-style:italic;">Ескертпе: ${e2(o.order_note)}</div>` : ''}
          </div>
          <div style="margin-bottom:10px;">
            <label style="font-size:11px;color:var(--muted);font-weight:700;">Жеткізуші номері / трек</label>
            <input type="text" class="log-delivery-input" data-order-id="${o.id}" data-original="${e2(o.delivery_contact||'')}" value="${e2(o.delivery_contact||'')}" placeholder="Такси немесе трек номері"
               oninput="logRowDirty(this)"
               style="width:100%;padding:10px;border:1px solid var(--brd);border-radius:10px;font-size:14px;margin-top:4px;box-sizing:border-box;background:rgba(255,255,255,.05);color:var(--text);font-family:inherit;">
          </div>
          <div style="margin-bottom:10px;">
            <label style="font-size:11px;color:var(--muted);font-weight:700;">Ескертпе</label>
            <input type="text" class="log-note-input" data-order-id="${o.id}" data-original="${e2(o.logistics_note||'')}" value="${e2(o.logistics_note||'')}" placeholder="Қысқа жазба"
               oninput="logRowDirty(this)"
               style="width:100%;padding:10px;border:1px solid var(--brd);border-radius:10px;font-size:14px;margin-top:4px;box-sizing:border-box;background:rgba(255,255,255,.05);color:var(--text);font-family:inherit;">
            <button type="button" class="log-save-btn" style="display:none;margin-top:6px;padding:8px 14px;background:var(--teal);color:#0f172a;border:none;border-radius:10px;font-weight:600;font-size:13px;cursor:pointer" onclick="logSaveRow(this)" data-order-id="${o.id}"><i class="bi bi-floppy-fill"></i> Сақтау</button>
          </div>
          <div class="status-grid">
            <select onchange="update('${o.id}', 'delivery_type', this.value)">
              ${deliveryTypes.map(x => `<option value="${e2(x)}" ${o.delivery_type === x ? 'selected' : ''}>${e2(x)}</option>`).join('')}
            </select>
            <select onchange="update('${o.id}', 'status', this.value)"
                    style="background: ${o.status==='Қабылданды'?'rgba(45,212,191,.2)':o.status==='Жолда'?'rgba(88,166,255,.2)':o.status==='Процесте'?'rgba(249,115,22,.2)':'rgba(255,255,255,.05)'};
                           color: ${o.status==='Қабылданды'?'var(--teal)':o.status==='Жолда'?'#a5b4fc':o.status==='Процесте'?'#fdba74':'var(--text)'}">
              <option value="Жаңа" ${o.status === 'Жаңа' ? 'selected' : ''}>Жаңа</option>
              <option value="Процесте" ${o.status === 'Процесте' ? 'selected' : ''}>Процесте</option>
              <option value="Жолда" ${o.status === 'Жолда' ? 'selected' : ''}>Жолда</option>
              <option value="Қабылданды" ${o.status === 'Қабылданды' ? 'selected' : ''}>Жетті</option>
              <option value="Қайтарылды" ${o.status === 'Қайтарылды' ? 'selected' : ''}>Қайтты</option>
            </select>
          </div>
        </div>
      `).join('');
      if (window.lucide) lucide.createIcons();
    }

    async function update(id, field, val) {
      const { error } = await supabaseClient.from('aiat_orders').update({ [field]: val }).eq('id', id);
      if (!error) {
        const item = store.find(o => o.id == id);
        if (item) { item[field] = val; filter(); }
      }
    }
    function logRowDirty(inp) {
      const card = inp.closest('.card');
      if (!card) return;
      const contactInp = card.querySelector('.log-delivery-input');
      const noteInp = card.querySelector('.log-note-input');
      const origC = (contactInp && contactInp.getAttribute('data-original')) || '';
      const origN = (noteInp && noteInp.getAttribute('data-original')) || '';
      const dirty = (contactInp && contactInp.value !== origC) || (noteInp && noteInp.value !== origN);
      const btn = card.querySelector('.log-save-btn');
      if (btn) btn.style.display = dirty ? 'inline-block' : 'none';
    }
    async function logSaveRow(btn) {
      const id = btn.getAttribute('data-order-id');
      const card = btn.closest('.card');
      const contactInp = card.querySelector('.log-delivery-input');
      const noteInp = card.querySelector('.log-note-input');
      const contactVal = contactInp ? contactInp.value : '';
      const noteVal = noteInp ? noteInp.value : '';
      const { error } = await supabaseClient.from('aiat_orders').update({ delivery_contact: contactVal, logistics_note: noteVal }).eq('id', id);
      if (!error) {
        const item = store.find(o => o.id == id);
        if (item) { item.delivery_contact = contactVal; item.logistics_note = noteVal; }
        if (contactInp) contactInp.setAttribute('data-original', contactVal);
        if (noteInp) noteInp.setAttribute('data-original', noteVal);
        btn.style.display = 'none';
      }
    }

    function copy(elementId, btn) {
      const text = document.getElementById(elementId).innerText;
      navigator.clipboard.writeText(text);
      const old = btn.innerText;
      btn.innerText = 'Көшірілді';
      setTimeout(() => btn.innerText = old, 1500);
    }

    function copyText(text, btn) {
      navigator.clipboard.writeText(text);
      const old = (btn && btn.innerText) || '';
      if (btn) { btn.innerText = 'Көшірілді'; setTimeout(() => { btn.innerText = old; }, 1500); }
    }

    load();
    </script>
