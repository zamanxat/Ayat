<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Айат | Гарантия талон</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="preload" href="certificate.jpeg" as="image" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root {
      --primary: #1e3a5f;
      --accent: #c2410c;
      --teal: #0d9488;
      --bg: #fafbfc;
      --card: #ffffff;
      --brd: #e2e8f0;
      --text: #0f172a;
      --muted: #475569;
    }
    [data-theme="dark"]{--bg:#0f172a;--card:#1e293b;--text:#f1f5f9;--muted:#94a3b8;--brd:#334155}
    [data-theme="dark"] input,[data-theme="dark"] .container{background:#1e293b!important;border-color:#334155!important;color:#f1f5f9!important}
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    [data-lucide] { display: inline-flex; align-items: center; justify-content: center; }
    [data-lucide] svg { width: 100%; height: 100%; flex-shrink: 0; }
    html { overflow-x: hidden; }
    body { font-family: "Plus Jakarta Sans", sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 20px; overflow-x: hidden; transition: background .25s, color .25s; }
    .container { background: var(--card); border: 1px solid var(--brd); width: 100%; max-width: 440px; padding: 24px 22px; border-radius: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 12px rgba(0,0,0,.04); }
    .back { margin-bottom: 16px; }
    .back a { text-decoration: none; color: var(--primary); font-weight: 700; font-size: 14px; display: inline-block; padding: 10px 16px; border: 1px solid var(--brd); border-radius: 12px; background: #f8fafc; transition: .2s; }
    .back a:hover { background: rgba(30,58,95,.1); border-color: var(--primary); }
    .back a { display: inline-flex; align-items: center; gap: 8px; }
    .back a .lucide { width: 18px; height: 18px; }
    h2 { text-align: center; color: var(--primary); margin-bottom: 24px; font-size: 20px; font-weight: 700; }
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
    input[type="text"], input[type="date"] { width: 100%; padding: 14px; border: 1px solid var(--brd); border-radius: 12px; font-size: 15px; outline: none; transition: .2s; background: #fff; color: var(--text); font-family: inherit; }
    input:disabled { background: #f1f5f9; color: var(--muted); }
    .toggle-box { display: flex; align-items: center; background: #f8fafc; padding: 12px 16px; border-radius: 12px; margin-bottom: 18px; cursor: pointer; border: 1px solid var(--brd); }
    .toggle-box input { margin-right: 10px; width: 18px; height: 18px; accent-color: var(--primary); }
    .toggle-box span { font-size: 14px; color: var(--text); }
    .btn-stack { display: flex; flex-direction: column; gap: 10px; }
    button { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; transition: .2s; font-family: inherit; }
    #generateBtn { background: linear-gradient(135deg, var(--primary), #152a47); color: white; }
    #generateBtn:disabled { background: #475569; cursor: not-allowed; }
    #saveToSheetBtn { background: var(--accent); color: white; display: none; }
    #downloadPngBtn { background: var(--teal); color: #0f172a; display: none; }
    #downloadPdfBtn { background: #64748b; color: white; display: none; }
    #statusMsg { text-align: center; margin-top: 16px; font-size: 14px; min-height: 20px; color: var(--muted); }
    canvas { display: none; width: 100%; max-width: 100%; margin-top: 20px; border-radius: 12px; border: 1px solid var(--brd); }
    input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(30,58,95,.1); }
    @media(max-width: 440px) {
      body { padding: 16px; }
      .container { padding: 22px 18px; border-radius: 16px; }
      .btn-stack button { padding: 12px; font-size: 14px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="back" style="display:flex;flex-wrap:wrap;gap:8px;align-items:center">
      <button type="button" onclick="toggleTheme()" style="background:transparent;border:1px solid var(--brd);border-radius:10px;padding:8px 12px;cursor:pointer;color:var(--text);font-size:16px" title="Қараңғы режим" id="themeBtn"><i class="bi bi-moon-stars-fill"></i></button>
      <a href="index.html"><i class="bi bi-arrow-left"></i> Артқа</a>
      <a href="admin.html" id="adminBackBtn" style="display:none;padding:8px 14px;font-size:13px;background:linear-gradient(135deg,var(--primary),#152a47);color:#fff;border-radius:10px;text-decoration:none;font-weight:600;align-items:center;gap:6px"><i class="bi bi-gear-fill"></i> Админ панелге қайту</a>
    </div>
    <script>if(new URLSearchParams(location.search).get('from')==='admin')document.getElementById('adminBackBtn').style.display='inline-flex';</script>
    <h2>Гарантия талоны</h2>
    <div class="form-group">
      <label>Клиенттің аты-жөні</label>
      <input id="clientName" type="text" placeholder="Мысалы: Аубакиров Жанболат" />
    </div>
    <div class="form-group">
      <label>Модель</label>
      <input id="modelName" type="text" placeholder="Мысалы: G2000" required />
    </div>
    <label class="toggle-box">
      <input type="checkbox" id="enableDate" />
      <span>Өткен күнді таңдау</span>
    </label>
    <div class="form-group">
      <label>Сатылған күні</label>
      <input id="customDate" type="date" disabled />
    </div>
    <div class="btn-stack">
      <button id="generateBtn" disabled>Жүктелуде...</button>
      <button id="saveToSheetBtn">Базаға сақтау</button>
      <button id="downloadPngBtn">Сурет ретінде (PNG)</button>
      <button id="downloadPdfBtn">Құжат ретінде (PDF)</button>
    </div>
    <p id="statusMsg"></p>
    <canvas id="canvas" width="1269" height="437"></canvas>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    function toggleTheme(){
      const html=document.documentElement;
      const isDark=html.getAttribute('data-theme')==='dark';
      if(isDark){html.removeAttribute('data-theme');localStorage.setItem('aiat_theme','light');}
      else{html.setAttribute('data-theme','dark');localStorage.setItem('aiat_theme','dark');}
      const btn=document.getElementById('themeBtn');
      if(btn) btn.innerHTML=html.getAttribute('data-theme')==='dark'?'<i class="bi bi-sun-fill"></i>':'<i class="bi bi-moon-stars-fill"></i>';
    }
    (function(){const t=localStorage.getItem('aiat_theme');if(t==='dark'){document.documentElement.setAttribute('data-theme','dark');const b=document.getElementById('themeBtn');if(b)b.innerHTML='<i class="bi bi-sun-fill"></i>';}})();

    var canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const bg = new Image();
    if (window.location.protocol !== "file:") bg.crossOrigin = "anonymous";
    bg.src = "certificate.jpeg";

      const SB_URL = 'https://jnuokhhqojlurvadcduv.supabase.co';
      const SB_KEY = 'sb_publishable_3l9NjY0Qadv3dJ9x3-t19w_8mKniZBk';
      const supabaseClient = window.supabase.createClient(SB_URL, SB_KEY);
      window._companyName='Айат';
      supabaseClient.from('aiat_site_display').select('company_name').eq('id',1).single().then(function(r){if(r.data&&r.data.company_name)window._companyName=r.data.company_name;}).catch(function(){});

      const generateBtn = document.getElementById("generateBtn");
    const saveToSheetBtn = document.getElementById("saveToSheetBtn");
    const downloadPngBtn = document.getElementById("downloadPngBtn");
    const downloadPdfBtn = document.getElementById("downloadPdfBtn");
    const statusMsg = document.getElementById("statusMsg");
    const enableDateCb = document.getElementById("enableDate");
    const customDateInput = document.getElementById("customDate");

    let currentData = null;

    /* ═══ ТАЛОН МӘТІН ОРНАЛАСУЫ — әр өріс үшін x, y өзгерту ═══
       talon.html файлында, осы блокты іздеңіз (Ctrl+F: TALON_POS) */
    const TALON_POS = {
      xNo: 710,    yNo: 243,    // No (артикул)
      xDate: 800,  yDate: 270, // Сату күні
      xModel: 755, yModel: 300, // Модель
      xFio: 750,   yFio: 331,   // Ф.И.О. (клиент аты)
      fontSize: 14
    };

    function enableGenerateBtn() {
      if (!generateBtn) return;
      generateBtn.disabled = false;
      generateBtn.textContent = "Талонды дайындау";
    }
    bg.onload = enableGenerateBtn;
    bg.onerror = function() {
      bg.src = "certificate.png";
      bg.onerror = function() {
        bg.src = "https://i.ibb.co/SDhx78Yg/talon-template.png";
        bg.onerror = function() {
          enableGenerateBtn();
          if (statusMsg) {
            statusMsg.textContent = "Шаблон суреті жүктелмеді. certificate.jpeg немесе certificate.png қойыңыз.";
            statusMsg.style.color = "#f87171";
          }
        };
      };
    };
    document.addEventListener("DOMContentLoaded", function() { setTimeout(enableGenerateBtn, 600); });
    setTimeout(enableGenerateBtn, 1200);

    document.addEventListener("DOMContentLoaded", function() {
      customDateInput.value = new Date().toISOString().slice(0, 10);
    });
    enableDateCb.onchange = () => {
      customDateInput.disabled = !enableDateCb.checked;
      if (enableDateCb.checked) customDateInput.value = new Date().toISOString().slice(0, 10);
      else customDateInput.value = new Date().toISOString().slice(0, 10);
    };

    function formatDate(date) {
      return String(date.getDate()).padStart(2, "0") + "." + String(date.getMonth() + 1).padStart(2, "0") + "." + date.getFullYear();
    }

    async function generateUniqueArticle() {
      for (let i = 0; i < 50; i++) {
        const num = Math.floor(1000 + Math.random() * 9000);
        const article = String(num);
        const { data } = await supabaseClient.from('aiat_warranty_talons').select('id').eq('article', article).maybeSingle();
        if (!data) return article;
      }
      return String(Math.floor(1000 + Math.random() * 9000));
    }

    async function generateCertificate() {
      const name = document.getElementById("clientName").value.trim();
      if (!name) {
        statusMsg.textContent = "Клиент атын жазыңыз!";
        statusMsg.style.color = "#f87171";
        return;
      }
      const modelVal = document.getElementById("modelName")?.value?.trim();
      if (!modelVal) {
        statusMsg.textContent = "Модельді жазыңыз!";
        statusMsg.style.color = "#f87171";
        return;
      }

      generateBtn.disabled = true;
      generateBtn.textContent = "Дайындалуда...";
      const article = await generateUniqueArticle();
      const model = modelVal || "Дайсон";
      const startDate = enableDateCb.checked && customDateInput.value ? new Date(customDateInput.value) : new Date();
      const expiry = new Date(startDate);
      expiry.setDate(startDate.getDate() + 45);

      const cw = bg.naturalWidth || 1269, ch = bg.naturalHeight || 437;
      canvas.width = cw; canvas.height = ch;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (!bg.complete || !bg.naturalWidth) {
        statusMsg.textContent = "Талон үшін шаблон суреті жүктелген болуы керек.";
        statusMsg.style.color = "#f87171";
        generateBtn.disabled = false;
        generateBtn.textContent = "Талонды дайындау";
        return;
      }
      ctx.drawImage(bg, 0, 0, cw, ch);
      ctx.fillStyle = "#000000";
      const fs = Math.round((TALON_POS.fontSize || 14) * cw / 1269);
      ctx.font = "400 " + fs + "px 'Plus Jakarta Sans', sans-serif";
      ctx.fillText(article, TALON_POS.xNo, TALON_POS.yNo);
      const saleDateForDraw = enableDateCb.checked && customDateInput.value ? new Date(customDateInput.value) : new Date();
      ctx.fillText(formatDate(saleDateForDraw), TALON_POS.xDate, TALON_POS.yDate);
      ctx.fillText(model, TALON_POS.xModel, TALON_POS.yModel);
      ctx.fillText(name, TALON_POS.xFio, TALON_POS.yFio);

      const saleDate = enableDateCb.checked && customDateInput.value ? customDateInput.value : new Date().toISOString().slice(0, 10);
      currentData = { client: name, article, model, saleDate, expiryDate: formatDate(expiry) };

      statusMsg.textContent = "Талон дайын! No: " + article;
      statusMsg.style.color = "#2dd4bf";
      generateBtn.disabled = false;
      generateBtn.textContent = "Талонды дайындау";

      canvas.style.display = "block";
      saveToSheetBtn.style.display = "block";
      downloadPngBtn.style.display = "block";
      downloadPdfBtn.style.display = "block";
      saveToSheetBtn.disabled = false;
      saveToSheetBtn.textContent = "Базаға сақтау";
    }

    async function saveToSheets() {
      if (!currentData) return;
      saveToSheetBtn.disabled = true;
      saveToSheetBtn.textContent = "Сақталуда...";
      try {
        const payload = {
          client_name: currentData.client,
          article: currentData.article,
          sale_date: currentData.saleDate || null,
          expiry_date: currentData.expiryDate || null,
          created_at: new Date().toISOString()
        };
        if (currentData.model) payload.model = currentData.model;
        const { error } = await supabaseClient.from('aiat_warranty_talons').insert(payload);
        if (error) {
          statusMsg.textContent = "Қате: " + (error.message || "базаға сақталмады");
          statusMsg.style.color = "#f87171";
          saveToSheetBtn.disabled = false;
          saveToSheetBtn.textContent = "Базаға сақтау";
          return;
        }
        statusMsg.textContent = "Мәліметтер базаға сақталды!";
        statusMsg.style.color = "#2dd4bf";
        saveToSheetBtn.textContent = "Сақталды ✅";
      } catch (e) {
        statusMsg.textContent = "Қате: " + (e.message || "сақталмады");
        statusMsg.style.color = "#f87171";
        saveToSheetBtn.disabled = false;
      }
    }

    downloadPngBtn.onclick = () => {
      try {
        const fileNamePart = currentData.client.replace(/\s+/g, '_');
        const link = document.createElement("a");
        link.download = `Certificate_${fileNamePart}.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();
        statusMsg.textContent = "PNG жүктелді.";
        statusMsg.style.color = "#2dd4bf";
      } catch (e) {
        statusMsg.textContent = "Сурет қате: " + (e.message || "The operation is insecure.");
        statusMsg.style.color = "#f87171";
      }
    };

    downloadPdfBtn.onclick = () => {
      if (!window.jspdf || !window.jspdf.jsPDF) {
        statusMsg.textContent = "PDF кітапханасы әлі жүктелмеді. Бір сәт күтіп қайта көріңіз.";
        statusMsg.style.color = "#f87171";
        return;
      }
      try {
        const jsPDF = window.jspdf.jsPDF;
        const imgData = canvas.toDataURL("image/png");
        const pdf = new jsPDF({ orientation: "landscape", unit: "px", format: [canvas.width, canvas.height] });
        pdf.addImage(imgData, "PNG", 0, 0, canvas.width, canvas.height);
        const fileNamePart = currentData.client.replace(/\s+/g, '_');
        pdf.save(`Certificate_${fileNamePart}.pdf`);
        statusMsg.textContent = "PDF жүктелді.";
        statusMsg.style.color = "#2dd4bf";
      } catch (e) {
        const errMsg = (e && e.message) ? e.message : "Қате";
        if (errMsg.indexOf("insecure") !== -1) {
          statusMsg.textContent = "PDF қате: Қауіпсіздік шектеуі. Сайтты интернет серверден ашыңыз.";
          statusMsg.style.color = "#f87171";
        } else {
          statusMsg.textContent = "PDF қате: " + errMsg;
          statusMsg.style.color = "#f87171";
        }
      }
    };

    generateBtn.onclick = generateCertificate;
    saveToSheetBtn.onclick = saveToSheets;
    document.addEventListener('DOMContentLoaded', function() { function initIcons(){ if(window.lucide&&window.lucide.createIcons){ window.lucide.createIcons(); return true; } return false; } initIcons()||setTimeout(initIcons,150); setTimeout(initIcons,600); });
  </script>
</body>
</html>
