<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5, viewport-fit=cover">
<title>Айат — Тапсырыс</title>
<link rel="shortcut icon" href="https://i.ibb.co.com/xqrTSq0d/logo2.jpg" type="image/x-icon">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.inputmask/5.0.8/jquery.inputmask.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --primary:#1e3a5f;--primary-dark:#152a47;
  --accent:#c2410c;--accent-soft:rgba(194,65,12,0.1);
  --teal:#0d9488;--bg:#fafbfc;--card:#ffffff;
  --brd:#e2e8f0;--r:#b91c1c;
  --text:#0f172a;--muted:#475569;
}
[data-theme="dark"]{--bg:#0f172a;--card:#1e293b;--text:#f1f5f9;--muted:#94a3b8;--brd:#334155}
[data-theme="dark"] input,[data-theme="dark"] select,[data-theme="dark"] .container,[data-theme="dark"] .log-box{background:#1e293b!important;border-color:#334155!important;color:#f1f5f9!important}
[data-theme="dark"] input::placeholder,[data-theme="dark"] select option{color:#94a3b8!important}
[data-theme="dark"] .back a{background:#334155!important;border-color:#475569!important;color:#93c5fd!important}
[data-theme="dark"] .back a:hover{background:#475569!important;border-color:#64748b!important;color:#bfdbfe!important}
[data-theme="dark"] .logo-text{color:#93c5fd!important}
[data-theme="dark"] label,.sec-title{color:#94a3b8!important}
[data-theme="dark"] .sec-title::after{background:#334155!important}
[data-theme="dark"] .file-upload,.time-check-wrap{background:#1e293b!important;border-color:#334155!important}
[data-theme="dark"] .time-check-wrap span{color:#f1f5f9!important}
[data-theme="dark"] .split-block,.pay-toggle{background:rgba(13,148,136,.15)!important;border-color:rgba(13,148,136,.4)!important}
[data-theme="dark"] .split-block label,[data-theme="dark"] .pay-toggle span{color:#5eead4!important}
[data-theme="dark"] .split-block input,[data-theme="dark"] .split-block select{background:#1e293b!important;border-color:#334155!important;color:#f1f5f9!important}
[data-theme="dark"] .total-box{background:rgba(30,58,95,.2)!important;border-color:#334155!important}
[data-theme="dark"] .total-box label{color:#93c5fd!important}
[data-theme="dark"] .add-btn{background:rgba(30,58,95,.2)!important;border-color:#475569!important;color:#93c5fd!important}
[data-theme="dark"] .add-btn:hover{background:rgba(30,58,95,.3)!important}
[data-theme="dark"] .log-search input,.log-mgr-filter{background:#1e293b!important;border-color:#334155!important;color:#f1f5f9!important}
[data-theme="dark"] .log-search .bi,.log-search .lucide{color:#94a3b8!important}
[data-theme="dark"] .log-card{background:#1e293b!important;border-color:#334155!important}
[data-theme="dark"] .log-card b{color:#f1f5f9!important}
[data-theme="dark"] .log-meta,.log-note{color:#94a3b8!important}
[data-theme="dark"] .log-note{background:#334155!important;border-color:#475569!important}
[data-theme="dark"] .popup{color:#fff!important}
[data-theme="dark"] .theme-btn{background:#334155!important;border-color:#475569!important;color:#f1f5f9!important}
[data-theme="dark"] .theme-btn:hover{background:#475569!important}
[data-theme="dark"] .site-bnav .bnav-item{color:#94a3b8!important}
[data-theme="dark"] .site-bnav .bnav-item.active{color:#93c5fd!important;background:rgba(30,58,95,.3)!important}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
img{max-width:100%;height:auto}
[data-lucide]{display:inline-flex;align-items:center;justify-content:center}
[data-lucide] svg{width:100%;height:100%;flex-shrink:0}
.bi{display:inline-flex;align-items:center;justify-content:center;vertical-align:middle;line-height:1;flex-shrink:0}
html{overflow-x:hidden;-webkit-overflow-scrolling:touch}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);padding:16px;padding-left:max(16px,env(safe-area-inset-left));padding-right:max(16px,env(safe-area-inset-right));padding-bottom:max(80px,calc(60px + env(safe-area-inset-bottom)));display:flex;justify-content:center;align-items:flex-start;min-height:100vh;min-height:100dvh;overflow-x:hidden;width:100%;transition:background .25s,color .25s}
.container{width:100%;max-width:640px;min-width:0;background:var(--card);border:1px solid var(--brd);border-radius:16px;box-shadow:0 1px 2px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.06);overflow:hidden;margin-bottom:40px;align-self:flex-start}
.header{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;border-bottom:1px solid var(--brd);background:var(--card);flex-wrap:wrap}
.theme-btn{background:transparent;border:1px solid var(--brd);border-radius:10px;padding:8px 12px;cursor:pointer;color:var(--text);font-size:18px;display:inline-flex;align-items:center;justify-content:center;min-width:44px;min-height:44px}
.theme-btn:hover{background:rgba(30,58,95,.1)}
.header-left{display:flex;align-items:center;gap:12px;min-width:0;flex:1}
.header-right{display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap}
.logo-img{max-height:40px;width:auto;border-radius:10px;flex-shrink:0}
.logo-text{font-size:18px;font-weight:800;color:var(--primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
form{padding:24px}
.sec-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin:24px 0 12px;display:flex;align-items:center;gap:12px}
.sec-title::after{content:"";flex:1;height:1px;background:var(--brd);min-width:0}
label{display:block;margin-bottom:6px;font-size:13px;font-weight:600;color:var(--text)}
input,select{width:100%;padding:14px;border:1px solid var(--brd);border-radius:12px;font-size:15px;outline:none;background:#fff;transition:border .25s;font-family:inherit;color:var(--text)}
input:focus,select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
input::placeholder{color:var(--muted)}
.field{margin-bottom:16px}
.hidden{display:none}
.item-row{display:grid;grid-template-columns:1fr 80px 44px;gap:10px;margin-bottom:10px;align-items:center;min-width:0}
.add-btn{background:rgba(30,58,95,.06);color:var(--primary);border:2px dashed var(--primary);padding:12px;width:100%;border-radius:12px;cursor:pointer;font-weight:700;font-size:14px;margin-bottom:8px;font-family:inherit;transition:all .2s;display:inline-flex;align-items:center;justify-content:center;gap:8px}
.add-btn:hover{background:rgba(30,58,95,.1)}
.add-btn .bi{font-size:16px}
.remove-btn{background:rgba(185,28,28,.08);color:var(--r);border:1px solid rgba(185,28,28,.2);border-radius:10px;height:46px;min-width:44px;cursor:pointer;font-size:18px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.remove-btn .bi{font-size:16px}
.file-upload{border:2px dashed var(--brd);padding:20px;border-radius:14px;text-align:center;cursor:pointer;position:relative;transition:all .25s;background:#f8fafc}
.file-upload:hover{border-color:var(--primary);background:rgba(30,58,95,.04)}
#receipt-preview{max-width:100%;height:auto;border-radius:10px;margin-top:12px;display:none}
.remove-file-btn{position:absolute;top:10px;right:10px;background:var(--r);color:#fff;border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;display:none;z-index:10;font-weight:700;font-size:15px}
.time-check-wrap{display:flex;align-items:center;gap:10px;background:#f8fafc;padding:12px 16px;border-radius:12px;border:1px solid var(--brd);margin-bottom:14px;cursor:pointer}
.time-check-wrap input[type=checkbox]{width:18px;height:18px;cursor:pointer;accent-color:var(--primary)}
.time-check-wrap span{font-size:14px;font-weight:500;color:var(--text)}
.split-block{background:rgba(13,148,136,.08);border:1px solid rgba(13,148,136,.25);border-radius:14px;padding:16px;margin-bottom:8px}
.split-block label{color:#0f766e;font-size:13px;font-weight:600}
.split-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.split-row:last-child{margin-bottom:0}
.pay-toggle{display:flex;align-items:center;gap:10px;background:rgba(13,148,136,.08);padding:12px 16px;border-radius:12px;border:1px solid rgba(13,148,136,.25);margin-bottom:12px;cursor:pointer}
.pay-toggle input[type=checkbox]{width:18px;height:18px;cursor:pointer;accent-color:var(--teal)}
.pay-toggle span{font-size:13.5px;font-weight:600;color:#0f766e}
.total-box{background:rgba(30,58,95,.06);padding:18px;border-radius:14px;margin-top:22px;border:1px solid rgba(30,58,95,.15)}
.total-box label{color:var(--primary);font-size:14px;font-weight:600;margin-bottom:8px}
.submit-btn{width:100%;padding:18px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;border:none;border-radius:14px;font-size:17px;font-weight:700;cursor:pointer;margin-top:20px;transition:transform .1s,box-shadow .2s;font-family:inherit;display:inline-flex;align-items:center;justify-content:center;gap:8px}
.submit-btn:hover{box-shadow:0 6px 20px rgba(30,58,95,.25)}
.submit-btn .bi{font-size:18px}
.submit-btn:active{transform:scale(.98)}
.submit-btn:disabled{background:#64748b;cursor:not-allowed;box-shadow:none}
.popup{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-20px);background:var(--text);color:#fff;padding:12px 24px;border-radius:12px;font-size:13px;font-weight:600;z-index:9999;pointer-events:none;transition:opacity .18s,transform .18s;opacity:0;max-width:calc(100vw - 32px);text-align:center;box-shadow:0 10px 30px rgba(0,0,0,.15);border:1px solid var(--brd)}
.popup.show{opacity:1;transform:translateX(-50%) translateY(0)}
.popup.g{background:var(--teal);border-color:var(--teal)}
.popup.r{background:var(--r);border-color:var(--r)}
.logistics-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 16px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap}
.logistics-btn:hover{background:#9a3412}
.logistics-btn .bi,.back a .bi,.log-head .bi{font-size:1em;flex-shrink:0}
.back a [data-lucide]{width:18px;height:18px}
.logistics-btn [data-lucide],.submit-btn [data-lucide],.add-btn [data-lucide]{width:18px;height:18px}
.log-head [data-lucide]{width:20px;height:20px}
.log-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.4);backdrop-filter:blur(8px);z-index:10000;padding:16px;overflow-y:auto}
.log-overlay.show{display:block}
.log-box{max-width:560px;width:100%;margin:0 auto 24px;background:var(--card);border:1px solid var(--brd);border-radius:20px;box-shadow:0 24px 60px rgba(0,0,0,.12);overflow:hidden;flex-shrink:0}
.log-head{padding:18px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.log-head h2{margin:0;font-size:16px;display:flex;align-items:center;gap:8px}
.log-close{background:rgba(255,255,255,.2);border:none;color:#fff;width:36px;height:36px;min-width:36px;min-height:36px;border-radius:10px;cursor:pointer;font-size:16px;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center}
.log-filters{display:flex;gap:8px;padding:14px;border-bottom:1px solid var(--brd);flex-wrap:wrap;align-items:center}
.log-search{position:relative;flex:1;min-width:0}
.log-search .bi,.log-search .lucide{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px;pointer-events:none;z-index:1}
.log-search .lucide{width:18px;height:18px}
.log-search input{width:100%;padding:11px 14px 11px 38px;border:1px solid var(--brd);border-radius:10px;font-size:14px;outline:none;font-family:inherit;background:#fff;color:var(--text)}
.log-search input:focus{border-color:var(--primary)}
.log-mgr-filter{padding:10px 14px;border:1px solid var(--brd);border-radius:10px;font-size:13px;font-family:inherit;outline:none;background:#fff;color:var(--text);min-width:140px;cursor:pointer}
.log-mgr-filter:focus{border-color:var(--primary)}
.log-list{padding:14px;max-height:68vh;overflow-y:auto}
.log-card{border:1px solid var(--brd);border-radius:14px;padding:16px;margin-bottom:12px;background:#f8fafc}
.log-card:last-child{margin-bottom:0}
.log-card-row{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:6px}
.log-card-row:last-child{margin-bottom:0}
.log-card b{font-size:14px;color:var(--text)}
.log-meta{font-size:12px;color:var(--muted)}
.log-track{display:flex;align-items:center;gap:8px;background:rgba(5,150,105,.1);color:var(--teal);padding:8px 12px;border-radius:10px;font-size:12.5px;font-weight:600;margin-top:8px;justify-content:space-between}
.log-track-text{display:flex;align-items:center;gap:6px;overflow:hidden}
.log-track-text span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.copy-btn{background:var(--teal);color:#fff;border:none;border-radius:8px;padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:4px;flex-shrink:0;font-family:inherit}
.copy-btn:hover{background:#047857}
.copy-btn .lucide{width:12px;height:12px}
.log-note{font-size:12px;color:var(--muted);margin-top:6px;font-style:italic;padding:8px 12px;background:#f1f5f9;border-radius:8px;border-left:3px solid var(--brd)}
.log-status{font-size:11px;font-weight:700;padding:4px 9px;border-radius:6px;white-space:nowrap}
.log-status-new{background:rgba(30,58,95,.12);color:#1e3a5f}
.log-status-process{background:rgba(194,65,12,.12);color:#c2410c}
.log-status-ship{background:rgba(13,148,136,.12);color:#0f766e}
.log-status-done{background:rgba(13,148,136,.14);color:#0d9488}
.log-status-return{background:rgba(185,28,28,.12);color:#b91c1c}
.log-status-arrived{background:rgba(180,83,9,.12);color:#b45309}
.log-empty{padding:32px;text-align:center;color:var(--muted);font-size:14px;display:flex;align-items:center;justify-content:center;gap:10px;flex-direction:column}
.log-empty .lucide{width:24px;height:24px}
.spin-icon{animation:spin 0.8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
.back{margin-bottom:12px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.back a{text-decoration:none;color:var(--primary);font-weight:700;font-size:14px;display:inline-flex;align-items:center;gap:8px;padding:10px 16px;border:1px solid var(--brd);border-radius:12px;background:#f8fafc;transition:.2s}
@media(max-width:640px){.back .back-to-index{display:none!important}}
@media(min-width:641px){.back .back-to-index{display:inline-flex}}
.back a:hover{background:rgba(30,58,95,.1);border-color:var(--primary)}
.back a .bi{font-size:16px}
.logistics-btn .lucide{width:18px;height:18px}
.log-head .lucide{width:20px;height:20px}
.log-close .lucide{width:18px;height:18px}
@media(max-width:600px){
  body{padding:12px;padding-bottom:calc(70px + env(safe-area-inset-bottom));min-height:100vh;min-height:100dvh}
  .container{max-width:100%;border-radius:14px;margin-bottom:24px}
  .header{padding:12px 14px;gap:10px}
  .header-left{min-width:0}
  .header-right{flex-wrap:wrap;justify-content:flex-end;gap:6px}
  .logo-img{max-height:36px}
  .logo-text{font-size:16px}
  .split-row{grid-template-columns:1fr}
  .item-row{grid-template-columns:1fr 70px 40px;gap:8px}
  form{padding:18px 16px}
  .sec-title{font-size:9px;margin:20px 0 10px}
  .logistics-btn span{display:none}
  .logistics-btn{padding:10px 12px;font-size:14px}
  .log-mgr-filter{width:100%;min-width:unset}
  .back a{padding:8px 14px;font-size:13px}
  input,select{font-size:16px;padding:12px}
  input[type="tel"]{font-size:16px}
  .submit-btn{padding:16px;font-size:16px}
  .log-box{max-width:100%;margin:0 16px 24px;border-radius:16px}
  .log-filters{flex-direction:column;align-items:stretch}
  .log-search{min-width:unset}
  .popup{max-width:calc(100vw - 24px);font-size:12px;padding:10px 18px}
}
.site-bnav{display:none;position:fixed;bottom:0;left:0;right:0;height:calc(60px + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);background:var(--card);z-index:100;border-top:1px solid var(--brd);box-shadow:0 -4px 20px rgba(0,0,0,.08)}
.site-bnav .bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(--muted);font-size:10px;font-weight:600;text-decoration:none;padding:8px 4px;min-width:0;transition:color .15s}
.site-bnav .bnav-item:hover,.site-bnav .bnav-item.active{color:var(--primary)}
.site-bnav .bnav-item.active{font-weight:700;background:rgba(30,58,95,.12);border-radius:10px;margin:4px 2px}
.site-bnav .bnav-item .bi{font-size:22px}
.site-bnav .bnav-item span{white-space:nowrap}
[data-theme="dark"] .site-bnav{background:var(--card);border-color:var(--brd);box-shadow:0 -4px 20px rgba(0,0,0,.3)}
@media(max-width:640px){.site-bnav{display:flex;align-items:stretch}}
@media(max-width:400px){
  body{padding:10px;padding-bottom:calc(70px + env(safe-area-inset-bottom))}
  .container{padding:0;border-radius:12px}
  form{padding:16px 14px}
  .item-row{grid-template-columns:1fr 60px 36px;gap:6px}
  .remove-btn{height:42px;font-size:16px}
  .add-btn{padding:10px;font-size:13px}
  .submit-btn{padding:14px;font-size:15px}
  .total-box{padding:14px}
  .split-block{padding:12px}
  .file-upload{padding:16px}
}
</style>
</head>
<body>
<div class="container">
  <div class="back" style="padding:14px 18px 0;">
    <a href="index.html" class="back-to-index"><i class="bi bi-arrow-left"></i> Артқа</a>
    <a href="admin.html" id="adminBackBtn" style="display:none;padding:8px 14px;font-size:13px;background:linear-gradient(135deg,var(--primary),#152a47);color:#fff;border-radius:10px;text-decoration:none;font-weight:600;align-items:center;gap:6px"><i class="bi bi-gear-fill"></i> Админ панелге қайту</a>
  </div>
  <script>if(new URLSearchParams(location.search).get('from')==='admin')document.getElementById('adminBackBtn').style.display='inline-flex';</script>
  <div class="header">
    <div class="header-left">
      <img src="https://i.ibb.co.com/xqrTSq0d/logo2.jpg" alt="Айат" class="logo-img">
      <span class="logo-text" id="companyName">Айат</span>
    </div>
    <div class="header-right">
      <button type="button" class="theme-btn" onclick="toggleTheme()" title="Қараңғы режим" id="themeBtn"><i class="bi bi-moon-stars-fill"></i></button>
      <button type="button" class="logistics-btn" onclick="openLogisticsPopup()"><i class="bi bi-truck"></i><span>Жеткізулер</span></button>
      <button type="button" class="logistics-btn" onclick="openLeadPopup()" style="background:var(--teal)"><i class="bi bi-megaphone-fill"></i><span>Лид</span></button>
    </div>
  </div>
  <form id="orderForm">
    <div class="sec-title">Жауапты тұлға</div>
    <div class="field">
      <select id="manager_id" required oninvalid="this.setCustomValidity('Менеджерді таңдаңыз')" oninput="this.setCustomValidity('')">
        <option value="" disabled selected>Менеджерді таңдаңыз...</option>
      </select>
    </div>
    <div class="sec-title">Тапсырыс уақыты</div>
    <label class="time-check-wrap" for="manualTimeCheck">
      <input type="checkbox" id="manualTimeCheck" onchange="toggleTime()">
      <span>Уақытты қолмен таңдау</span>
    </label>
    <div id="manualTimeFields" class="hidden">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
        <div><label>Күні:</label><input type="date" id="orderDate"></div>
        <div><label>Уақыты:</label><input type="time" id="orderTime"></div>
      </div>
    </div>
    <div class="sec-title">Клиент мәліметі</div>
    <div class="field"><input type="text" id="client_name" placeholder="Клиент аты-жөні" required oninvalid="this.setCustomValidity('Клиент атын жазыңыз')" oninput="this.setCustomValidity('')"></div>
    <div class="field"><input type="tel" id="client_phone" inputmode="numeric" placeholder="+7 (___) ___-____" required oninvalid="this.setCustomValidity('Телефонды жазыңыз')" oninput="this.setCustomValidity('')"></div>

<script>
const SB_URL='https://jnuokhhqojlurvadcduv.supabase.co';
const SB_KEY='sb_publishable_3l9NjY0Qadv3dJ9x3-t19w_8mKniZBk';
const sb=window.supabase?window.supabase.createClient(SB_URL,SB_KEY):null;
const DPCT=9;
const PAY_OPTS_FALLBACK=['Kaspi Transfer','Halyk Transfer','Kaspi рассрочка','Halyk рассрочка','Kaspi Red','Наличка'];
const DELIVERY_OPTS_FALLBACK=['Такси','Курьер','Почта','Поезд'];
let tabletOptions=[],giftOptions=[],mgrBonusDefaults={},mgrMap={},productCostMap={},autoBonusRules=[],colorOptions=[];

$(document).ready(async function(){
  $('#client_phone').inputmask('+7 (999) 999-9999');
  await loadSiteData();
  try{const ch=new BroadcastChannel('aiat_site_sync');ch.onmessage=e=>{if(e.data==='aiat_paydel_updated')loadPayDelOnly();if(e.data==='aiat_colors_updated')loadSiteData();};}catch(_){}
});

async function safeQuery(fn){try{const r=await fn();return r;}catch(e){return{data:null,error:e};}}

async function loadSiteData(){
  if(!sb){console.error('Supabase жүктелмеді');return;}
  const[mR,bR,pR,payR,delR,abR,colorsR]=await Promise.all([
    safeQuery(()=>sb.from('aiat_site_managers').select('id,name,is_active,sort_order').eq('is_active',true).order('sort_order').order('id')),
    safeQuery(()=>sb.from('aiat_manager_bonus_settings').select('manager_id,default_bonus_percent')),
    safeQuery(()=>sb.from('aiat_site_products').select('name,category,cost,is_active').eq('is_active',true).order('category').order('sort_order')),
    safeQuery(()=>sb.from('aiat_payment_types').select('name').order('sort_order')),
    safeQuery(()=>sb.from('aiat_delivery_types').select('name').order('sort_order')),
    safeQuery(()=>sb.from('aiat_auto_bonus_rules').select('*').eq('is_active',true).order('min_amount')),
    safeQuery(()=>sb.from('aiat_product_colors').select('name').eq('is_active',true).order('sort_order').order('id'))
  ]);
  mgrMap={};
  const mgrs=(mR&&mR.data&&!mR.error)?mR.data:[];
  mgrs.forEach(m=>{mgrMap[m.id]=m.name;});
  const mgrSel=document.getElementById('manager_id');
  if(mgrSel){
    mgrSel.innerHTML='<option value="" disabled selected>Менеджерді таңдаңыз...</option>';
    if(mgrs.length){ mgrs.forEach(m=>mgrSel.add(new Option(m.name,m.id))); }
    else { mgrSel.innerHTML+='<option value="">— Менеджерлер жоқ —</option>'; mgrSel.required=false; }
  }
  mgrBonusDefaults={};
  if(bR&&bR.data)(bR.data).forEach(b=>{mgrBonusDefaults[b.manager_id]=b.default_bonus_percent;});
  const prods=(pR&&pR.data&&!pR.error)?pR.data:[];
  productCostMap={};
  prods.forEach(p=>{productCostMap[p.name]=parseFloat(p.cost)||0;});
  tabletOptions=prods.filter(p=>p.category==='tablet').map(p=>p.name);
  giftOptions=prods.filter(p=>p.category==='gift').map(p=>p.name);
  if(!tabletOptions.length) tabletOptions=['G2000','17 Pro Max','17 Pad Pro'];
  if(!giftOptions.length) giftOptions=['Смарт набор','Массажер','Смарт сағат','Переходник'];
  autoBonusRules=(abR&&abR.data&&!abR.error)?abR.data:[];
  colorOptions=(colorsR&&colorsR.data&&!colorsR.error)?colorsR.data.map(c=>c.name):['Қара','Ақ','Көк','Қызыл','Жасыл','Сұр'];
  const colorSel=document.getElementById('product_color');
  if(colorSel){
    colorSel.innerHTML='<option value="" disabled selected>Түсті таңдаңыз...</option>'+colorOptions.map(n=>`<option value="${eAttr(n)}">${eHtml(n)}</option>`).join('');
  }
  applyPayDel(payR,delR);
}
function applyPayDel(payR,delR){
  const payNames=(payR&&payR.data&&payR.data.length)?payR.data.map(p=>p.name):PAY_OPTS_FALLBACK;
  const payOpts=payNames.map(n=>`<option value="${eAttr(n)}">${eHtml(n)}</option>`).join('');
  const payEl=document.getElementById('payment_type');
  if(payEl) payEl.innerHTML='<option value="" disabled selected>— таңдаңыз —</option>'+payOpts;
  const p1=document.getElementById('pay1_type'); if(p1) p1.innerHTML=payOpts;
  const p2=document.getElementById('pay2_type'); if(p2) p2.innerHTML=payOpts;
  const delNames=(delR&&delR.data&&delR.data.length)?delR.data.map(d=>d.name):DELIVERY_OPTS_FALLBACK;
  const delOpts=delNames.map(n=>`<option value="${eAttr(n)}">${eHtml(n)}</option>`).join('');
  const delEl=document.getElementById('delivery_type'); if(delEl) delEl.innerHTML=delOpts||'<option>Курьер</option>';
}
async function loadPayDelOnly(){
  const[payR,delR]=await Promise.all([
    safeQuery(()=>sb.from('aiat_payment_types').select('name').order('sort_order')),
    safeQuery(()=>sb.from('aiat_delivery_types').select('name').order('sort_order'))
  ]);
  applyPayDel(payR,delR);
}

function eHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function eAttr(s){return String(s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

function buildOptions(arr){return arr.map(n=>`<option value="${n}">${n}</option>`).join('');}
function addItem(containerId,type){
  const div=document.createElement('div');div.className='item-row';
  const opts=type==='tablet'?buildOptions(tabletOptions):buildOptions(giftOptions);
  div.innerHTML=`<select class="${type}-select">${opts}</select><input type="number" inputmode="numeric" class="item-count" value="1" min="1" style="padding:14px"><button type="button" class="remove-btn" onclick="this.parentElement.remove()">×</button>`;
  document.getElementById(containerId).appendChild(div);
}

function toggleTime(){
  const on=document.getElementById('manualTimeCheck').checked;
  document.getElementById('manualTimeFields').classList.toggle('hidden',!on);
  if(on){const now=new Date();document.getElementById('orderDate').value=now.toISOString().slice(0,10);document.getElementById('orderTime').value=now.toTimeString().slice(0,5);}
}

function toggleSplit(){
  const on=document.getElementById('splitCheck').checked;
  document.getElementById('splitPayBlock').classList.toggle('hidden',!on);
  document.getElementById('singlePayBlock').classList.toggle('hidden',on);
  document.getElementById('singlePriceBox').classList.toggle('hidden',on);
  const pt=document.getElementById('payment_type');
  pt.required=!on;
  document.getElementById('price').required=!on;
  calcSplitTotal();
}

function calcSplitTotal(){
  const a1=parseFloat(document.getElementById('pay1_amount').value)||0;
  const a2=parseFloat(document.getElementById('pay2_amount').value)||0;
  document.getElementById('splitTotalDisp').textContent=(a1+a2).toLocaleString()+' ₸';
}

function previewImg(input){
  if(input.files&&input.files[0]){
    const r=new FileReader();
    r.onload=e=>{
      document.getElementById('receipt-preview').src=e.target.result;
      document.getElementById('receipt-preview').style.display='block';
      document.getElementById('removeFileBtn').style.display='block';
      document.getElementById('uploadText').style.display='none';
    };
    r.readAsDataURL(input.files[0]);
  }
}
function clearImg(e){
  e.stopPropagation();
  document.getElementById('receiptFile').value='';
  document.getElementById('receipt-preview').src='';
  document.getElementById('receipt-preview').style.display='none';
  document.getElementById('removeFileBtn').style.display='none';
  document.getElementById('uploadText').style.display='block';
}

document.getElementById('orderForm').addEventListener('submit',async function(e){
  e.preventDefault();
  const btn=document.getElementById('submitBtn');
  btn.textContent='Жіберілуде...';btn.disabled=true;
  const isSplit=document.getElementById('splitCheck').checked;
  let products='';
  document.querySelectorAll('.tablet-select').forEach((s,i)=>{products+=s.value+' ('+document.querySelectorAll('#tabletsContainer .item-count')[i].value+' шт); ';});
  let gifts='';
  document.querySelectorAll('.gift-select').forEach((s,i)=>{gifts+=s.value+' ('+document.querySelectorAll('#giftsContainer .item-count')[i].value+' шт); ';});
  let finalTime;
  if(document.getElementById('manualTimeCheck').checked){
    const d=document.getElementById('orderDate').value,t=document.getElementById('orderTime').value;
    finalTime=new Date(`${d}T${t}`).toISOString();
  } else {
    finalTime=new Date().toISOString();
  }
  try{
    let receiptUrl='';
    const file=document.getElementById('receiptFile').files[0];
    if(file){
      const fname='aiat_'+Date.now()+'_receipt.jpg';
      const{error:ue}=await sb.storage.from('receipts').upload(fname,file);
      if(ue)throw new Error('Сурет жүктелмеді: '+ue.message);
      const{data:ud}=sb.storage.from('receipts').getPublicUrl(fname);
      receiptUrl=ud.publicUrl;
    }
    const colorVal=document.getElementById('product_color').value.trim();
    if(!colorVal){showPopup('Түсті таңдаңыз','r');btn.disabled=false;btn.textContent='Қайта жіберу';return;}
    const payload={
      created_at:finalTime,
      client_name:document.getElementById('client_name').value.trim(),
      client_phone:document.getElementById('client_phone').value.trim(),
      address:document.getElementById('address').value.trim(),
      product:products||'Таңдалмады',
      gift:gifts||'Жоқ',
      product_color:colorVal,
      order_note:(document.getElementById('order_note').value||'').trim()||null,
      delivery_type:document.getElementById('delivery_type').value,
      receipt_url:receiptUrl
    };
    const mgrId=parseInt(document.getElementById('manager_id').value)||null;
    payload.manager_id=mgrId;
    if(mgrId){
      const defPct=typeof mgrBonusDefaults[mgrId]==='number'?mgrBonusDefaults[mgrId]:DPCT;
      payload.bonus_percent=defPct;
    }
    if(isSplit){
      payload.payment_type=document.getElementById('pay1_type').value;
      payload.price=parseFloat(document.getElementById('pay1_amount').value)||0;
      payload.payment_type2=document.getElementById('pay2_type').value;
      payload.price2=parseFloat(document.getElementById('pay2_amount').value)||0;
    } else {
      payload.payment_type=document.getElementById('payment_type').value;
      payload.price=parseFloat(document.getElementById('price').value)||0;
      payload.price2=0;payload.payment_type2=null;
    }
    function calcCostTotal(str){
      let tot=0;
      (str||'').split(/;\s*/).filter(Boolean).forEach(part=>{
        const m=part.match(/^(.+?)\s*\((\d+)\s*шт\)\s*$/i);
        if(m){const name=m[1].trim(),qty=parseInt(m[2],10)||0;tot+=(productCostMap[name]||0)*qty;}
      });
      return tot;
    }
    payload.cost_total=calcCostTotal(products)+calcCostTotal(gifts);
    const{data:insertedOrd,error:dbErr}=await sb.from('aiat_orders').insert([payload]).select('id,price,price2,manager_id').single();
    if(dbErr)throw dbErr;
    if(insertedOrd&&insertedOrd.manager_id&&autoBonusRules.length){
      try{
        const todayStart=new Date();todayStart.setHours(0,0,0,0);
        const mgrId=insertedOrd.manager_id;
        const{data:todayOrds}=await sb.from('aiat_orders').select('price,price2').eq('manager_id',mgrId).gte('created_at',todayStart.toISOString());
        const dailyTotal=(todayOrds||[]).reduce((s,o)=>s+Number(o.price||0)+Number(o.price2||0),0);
        const matched=autoBonusRules.filter(r=>r.is_active&&dailyTotal>=Number(r.min_amount));
        if(matched.length){
          const{data:givenToday}=await sb.from('aiat_salary_payments').select('note').eq('manager_id',mgrId).eq('payment_kind','auto_bonus').gte('paid_at',todayStart.toISOString());
          const givenKeys=new Set((givenToday||[]).map(p=>p.note));
          const newBonuses=matched.filter(r=>!givenKeys.has(Number(r.min_amount).toLocaleString()+'₸ чекке авто-бонус'));
          if(newBonuses.length){
            const bonusInserts=newBonuses.map(r=>({
              manager_id:mgrId,
              amount:Number(r.bonus_amount),
              note:Number(r.min_amount).toLocaleString()+'₸ чекке авто-бонус',
              is_paid:true,
              paid_at:new Date().toISOString(),
              payment_kind:'auto_bonus',
              order_id:insertedOrd.id
            }));
            await sb.from('aiat_salary_payments').insert(bonusInserts);
          }
        }
      }catch(_){}
    }
    btn.textContent='ЖІБЕРІЛДІ';btn.style.background='var(--teal)';
    showPopup('Тапсырыс сәтті жіберілді!','g');
    setTimeout(()=>location.reload(),2200);
  } catch(err){
    console.error(err);
    showPopup('Қате: '+(err.message||'Белгісіз'),'r');
    btn.disabled=false;btn.textContent='Қайта жіберу';btn.style.background='';
  }
});

function toggleTheme(){
  const html=document.documentElement;
  const isDark=html.getAttribute('data-theme')==='dark';
  if(isDark){html.removeAttribute('data-theme');localStorage.setItem('aiat_theme','light');}
  else{html.setAttribute('data-theme','dark');localStorage.setItem('aiat_theme','dark');}
  const btn=document.getElementById('themeBtn');
  if(btn) btn.innerHTML=html.getAttribute('data-theme')==='dark'?'<i class="bi bi-sun-fill"></i>':'<i class="bi bi-moon-stars-fill"></i>';
}
(function(){const t=localStorage.getItem('aiat_theme');if(t==='dark'){document.documentElement.setAttribute('data-theme','dark');const b=document.getElementById('themeBtn');if(b)b.innerHTML='<i class="bi bi-sun-fill"></i>';}})();

let pt;
function showPopup(msg,type='g'){
  const el=document.getElementById('popup');
  el.textContent=msg;el.className='popup show '+(type||'g');
  clearTimeout(pt);pt=setTimeout(()=>el.classList.remove('show'),1600);
}

function copyText(text,btn){
  const fallback=()=>{
    const ta=document.createElement('textarea');
    ta.value=text;ta.style.cssText='position:fixed;left:-9999px;top:-9999px';
    document.body.appendChild(ta);ta.select();
    try{document.execCommand('copy');showPopup('Көшірілді!','g');}catch{showPopup(text,'g');}
    document.body.removeChild(ta);
  };
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>showPopup('Көшірілді!','g')).catch(fallback);
  } else fallback();
}

let logisticsOrders=[];
function openLogisticsPopup(){
  document.getElementById('logisticsOverlay').classList.add('show');
  document.getElementById('logSearchInp').value='';
  document.getElementById('logMgrFilter').value='';
  document.getElementById('logStatusFilter').value='Жаңа';
  document.getElementById('logSortFilter').value='desc';
  loadLogisticsOrders();
}
function closeLogisticsPopup(){
  document.getElementById('logisticsOverlay').classList.remove('show');
}

function openLeadPopup(){
  document.getElementById('leadOverlay').classList.add('show');
  const sel=document.getElementById('leadManagerId');
  sel.innerHTML='<option value="" disabled selected>Менеджерді таңдаңыз...</option>';
  Object.entries(mgrMap).forEach(([id,name])=>sel.add(new Option(name,id)));
  document.getElementById('leadPastDateCheck').checked=false;
  document.getElementById('leadDateFields').classList.add('hidden');
  const today=new Date().toISOString().slice(0,10);
  document.getElementById('leadDate').value=today;
  document.getElementById('leadCount').value='';
}
function closeLeadPopup(){
  document.getElementById('leadOverlay').classList.remove('show');
}
function toggleLeadDateFields(){
  const on=document.getElementById('leadPastDateCheck').checked;
  document.getElementById('leadDateFields').classList.toggle('hidden',!on);
  if(on){const d=new Date();document.getElementById('leadDate').value=d.toISOString().slice(0,10);}
}
async function saveLeadCount(){
  const mgrId=parseInt(document.getElementById('leadManagerId').value);
  const count=parseInt(document.getElementById('leadCount').value,10)||0;
  if(!mgrId){showPopup('Менеджерді таңдаңыз','r');return;}
  let leadDate;
  if(document.getElementById('leadPastDateCheck').checked){
    leadDate=document.getElementById('leadDate').value;
  }else{
    leadDate=new Date().toISOString().slice(0,10);
  }
  if(!leadDate){showPopup('Күнді таңдаңыз','r');return;}
  try{
    const{data:existing}=await sb.from('aiat_daily_leads').select('id').eq('manager_id',mgrId).eq('lead_date',leadDate).maybeSingle();
    if(existing){
      await sb.from('aiat_daily_leads').update({leads_count:count,updated_at:new Date().toISOString()}).eq('id',existing.id);
    }else{
      await sb.from('aiat_daily_leads').insert({manager_id:mgrId,lead_date:leadDate,leads_count:count});
    }
    showPopup('Лид саны сақталды!','g');
    closeLeadPopup();
  }catch(err){
    console.error(err);
    showPopup('Қате: '+(err.message||'Белгісіз'),'r');
  }
}

async function loadLogisticsOrders(){
  const listEl=document.getElementById('logisticsList');
  listEl.innerHTML='<div class="log-empty"><i class="bi bi-hourglass-split spin-icon"></i> Жүктелуде...</div>'; if(window.lucide) lucide.createIcons();
  const{data,error}=await sb.from('aiat_orders').select('*').order('created_at',{ascending:false});
  if(error){listEl.innerHTML='<div class="log-empty">Жүктеу қатесі</div>';return;}
  const{data:mD}=await sb.from('aiat_site_managers').select('id,name');
  (mD||[]).forEach(m=>{mgrMap[m.id]=m.name;});
  logisticsOrders=(data||[])
    .map(o=>({...o,_mgrName:mgrMap[o.manager_id]||o.manager_name||'',_status:(o.status||'').trim()||'Жаңа'}));
  const mgrSel=document.getElementById('logMgrFilter');
  const currentVal=mgrSel.value;
  const mgrs=[...new Set(logisticsOrders.map(o=>o._mgrName).filter(Boolean))];
  mgrSel.innerHTML='<option value="">Барлық менеджер</option>';
  mgrs.forEach(m=>mgrSel.innerHTML+=`<option value="${m}">${m}</option>`);
  mgrSel.value=currentVal;
  filterLogisticsList();
}

function filterLogisticsList(){
  const q=(document.getElementById('logSearchInp').value||'').toLowerCase().trim();
  const mgrF=(document.getElementById('logMgrFilter').value||'');
  const stF=(document.getElementById('logStatusFilter').value||'');
  let list=logisticsOrders;
  if(mgrF) list=list.filter(o=>o._mgrName===mgrF);
  if(stF) list=list.filter(o=>o._status===stF.trim());
  const sortDir=(document.getElementById('logSortFilter').value||'desc');
  list=[...list].sort((a,b)=>{
    const da=new Date(a.created_at||0),db=new Date(b.created_at||0);
    return sortDir==='asc'?da-db:db-da;
  });
  if(q) list=list.filter(o=>{
    const qNum=q.replace(/\D/g,'');
    return (o.client_name||'').toLowerCase().includes(q)
      ||(o.client_phone||'').replace(/\D/g,'').includes(qNum&&qNum.length>2?qNum:'\x00')
      ||(o.product||'').toLowerCase().includes(q)
      ||(o.gift||'').toLowerCase().includes(q)
      ||(o.address||'').toLowerCase().includes(q)
      ||(o._mgrName||'').toLowerCase().includes(q)
      ||(o.delivery_type||'').toLowerCase().includes(q)
      ||(o.delivery_contact||'').toLowerCase().includes(q)
      ||(o.logistics_note||'').toLowerCase().includes(q)
      ||(o.created_at||'').slice(0,10).includes(q)
      ||String(Number(o.price||0)+Number(o.price2||0)).includes(q);
  });
  const listEl=document.getElementById('logisticsList');
  if(!list.length){listEl.innerHTML='<div class="log-empty">Тапсырыс табылмады</div>';return;}
  const stCls={Жаңа:'log-status-new',Процесте:'log-status-process',Жолда:'log-status-ship',Қабылданды:'log-status-done',Жетті:'log-status-arrived',Қайтарылды:'log-status-return'};
  const e2=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  listEl.innerHTML=list.map(o=>{
    const total=Number(o.price||0)+Number(o.price2||0);
    const date=o.created_at?new Date(o.created_at).toLocaleDateString('kk-KZ'):'';
    const st=o._status||'Жаңа';
    const mgrName=o._mgrName?`<span class="log-meta" style="background:rgba(45,212,191,.2);color:var(--teal);padding:3px 8px;border-radius:6px;font-weight:600">${e2(o._mgrName)}</span>`:'';
    const trackHtml=o.delivery_contact?`
      <div class="log-track">
        <div class="log-track-text"><i class="bi bi-circle"></i><span>${e2(o.delivery_contact)}</span></div>
        <button class="copy-btn" onclick="copyText('${e2(o.delivery_contact)}',this)" title="Такси/жеткізуші номерін көшіру"><i class="bi bi-copy"></i> Көшіру</button>
      </div>`:'';
    const noteHtml=o.logistics_note?`<div class="log-note">${e2(o.logistics_note)}</div>`:'';
    const stLabel = st === 'Қабылданды' ? 'Жетті' : st;
    return`<div class="log-card">
      <div class="log-card-row"><b>${e2(o.client_name||'—')}</b><span class="log-status ${stCls[st]||'log-status-new'}">${stLabel}</span></div>
      <div class="log-card-row"><span class="log-meta">${e2(o.client_phone||'')}</span><span class="log-meta">${date}</span></div>
      <div class="log-card-row"><span class="log-meta">${e2(o.address||'')}</span></div>
      <div class="log-card-row"><span class="log-meta">${e2(o.product||'')}${o.gift?' + '+e2(o.gift):''}</span><b>${total.toLocaleString()} ₸</b></div>
      <div class="log-card-row"><span class="log-meta">${e2(o.delivery_type||'')}</span>${mgrName}</div>
      ${trackHtml}${noteHtml}
    </div>`;
  }).join('');
  if(window.lucide) lucide.createIcons();
}
</script>
