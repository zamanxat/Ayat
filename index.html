<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Айат — Басты бет</title>
<link rel="shortcut icon" href="https://i.ibb.co.com/xqrTSq0d/logo2.jpg" type="image/x-icon">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:#0c1426;color:#fff;min-height:100vh}
svg{display:block;flex-shrink:0}

/* TOP BAR */
.topbar{background:rgba(30,58,95,.9);backdrop-filter:blur(12px);padding:16px 20px;display:flex;align-items:center;gap:14px;border-bottom:1px solid rgba(255,255,255,.08);position:sticky;top:0;z-index:10}
.top-logo{width:42px;height:42px;border-radius:10px;object-fit:cover;border:2px solid rgba(255,255,255,.15)}
.top-name{font-size:17px;font-weight:800;color:#fff;line-height:1.2}
.top-sub{font-size:10px;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.1em;margin-top:1px}

/* MAIN */
.main{padding:28px 16px 48px;max-width:560px;margin:0 auto}
.greeting{margin-bottom:28px}
.greeting h2{font-size:24px;font-weight:800;color:#fff;letter-spacing:-.03em;margin-bottom:4px}
.greeting p{font-size:13px;color:rgba(255,255,255,.45)}

/* GRID */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* CARD */
.card{border-radius:20px;padding:20px;text-decoration:none;color:#fff;display:flex;flex-direction:column;gap:12px;border:1px solid transparent;transition:transform .2s ease,box-shadow .25s ease;position:relative;overflow:hidden;min-height:130px}
.card::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,.04);opacity:0;transition:opacity .2s}
.card:hover{transform:translateY(-4px);box-shadow:0 16px 48px rgba(0,0,0,.4)}
.card:hover::after{opacity:1}
.card:active{transform:translateY(-1px)}
.card.featured{grid-column:span 2;min-height:110px;flex-direction:row;align-items:center;gap:20px}
.card.featured .card-body{flex:1}

.ic{width:50px;height:50px;border-radius:15px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card.featured .ic{width:58px;height:58px;border-radius:17px}

.card h3{font-size:17px;font-weight:700;letter-spacing:-.02em}
.card.featured h3{font-size:19px}
.card-sub{font-size:12px;color:rgba(255,255,255,.55);margin-top:2px}
.card-arr{margin-top:auto;display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:rgba(255,255,255,.6)}
.card.featured .card-arr{margin-top:6px}

/* Colors */
.blue{background:linear-gradient(145deg,#1a3a8f,#1d4ed8);border-color:rgba(93,130,255,.25)}
.blue:hover{box-shadow:0 16px 48px rgba(29,78,216,.4)}
.teal{background:linear-gradient(145deg,#0f4c4c,#0d9488);border-color:rgba(45,212,191,.2)}
.teal:hover{box-shadow:0 16px 48px rgba(13,148,136,.4)}
.amber{background:linear-gradient(145deg,#7c3a00,#d97706);border-color:rgba(252,175,60,.2)}
.amber:hover{box-shadow:0 16px 48px rgba(217,119,6,.4)}
.coral{background:linear-gradient(145deg,#7f1d1d,#dc2626);border-color:rgba(248,113,113,.2)}
.coral:hover{box-shadow:0 16px 48px rgba(220,38,38,.4)}

/* RANKING */
.rank-section{margin-bottom:28px}
.rank-title{font-size:18px;font-weight:800;color:#fff;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.rank-title svg{width:28px;height:28px;color:#fbbf24}
.rank-period{font-size:12px;color:rgba(255,255,255,.55);margin-bottom:14px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.rank-period span{background:rgba(255,255,255,.08);padding:4px 10px;border-radius:8px;font-weight:600}
.rank-top3{display:grid;gap:14px}
.rank-item{background:linear-gradient(145deg,rgba(255,255,255,.08),rgba(255,255,255,.03));border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:18px 20px;display:flex;align-items:center;gap:16px;transition:transform .25s ease,box-shadow .25s ease;animation:rankSlide .5s ease backwards}
.rank-item:nth-child(1){animation-delay:.1s;border-color:rgba(251,191,36,.4);background:linear-gradient(145deg,rgba(251,191,36,.15),rgba(251,191,36,.05))}
.rank-item:nth-child(2){animation-delay:.2s;border-color:rgba(203,213,225,.35);background:linear-gradient(145deg,rgba(203,213,225,.12),rgba(203,213,225,.04))}
.rank-item:nth-child(3){animation-delay:.3s;border-color:rgba(205,127,50,.35);background:linear-gradient(145deg,rgba(205,127,50,.12),rgba(205,127,50,.04))}
.rank-item:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.2)}
.rank-pos{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;flex-shrink:0}
.rank-pos svg{width:28px;height:28px}
.rank-item:nth-child(1) .rank-pos{background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#0c1426}
.rank-item:nth-child(2) .rank-pos{background:linear-gradient(135deg,#94a3b8,#64748b);color:#fff}
.rank-item:nth-child(3) .rank-pos{background:linear-gradient(135deg,#cd7f32,#b45309);color:#fff}
.rank-body{flex:1;min-width:0}
.rank-name{font-size:17px;font-weight:700;color:#fff;margin-bottom:4px}
.rank-reward{font-size:13px;color:rgba(251,191,36,.95);font-weight:600}
.rank-reward-label{color:rgba(255,255,255,.6);font-weight:500;margin-right:4px}
.rank-sum{font-size:15px;font-weight:700;color:rgba(255,255,255,.9)}
.rank-more{display:flex;justify-content:center;margin-top:14px}
.rank-toggle{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:10px 20px;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;display:inline-flex;align-items:center;gap:8px}
.rank-toggle:hover{background:rgba(255,255,255,.15)}
.rank-toggle svg{transition:transform .3s ease}
.rank-rest{display:grid;gap:10px;margin-top:14px;max-height:0;overflow:hidden;transition:max-height .4s ease}
.rank-rest.open{max-height:800px}
.rank-rest .rank-item{animation:rankFade .4s ease}
@keyframes rankSlide{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes rankFade{from{opacity:0}to{opacity:1}}
.rank-load{text-align:center;padding:24px;color:rgba(255,255,255,.5);font-size:14px}
.rank-empty{text-align:center;padding:20px;color:rgba(255,255,255,.45);font-size:13px;background:rgba(255,255,255,.04);border-radius:14px;border:1px dashed rgba(255,255,255,.15)}

@media(max-width:460px){
  .main{padding:20px 14px 40px}
  .grid{gap:10px}
  .card{padding:16px;min-height:110px;border-radius:16px}
  .card.featured{flex-direction:column;align-items:flex-start;gap:10px}
  .ic{width:44px;height:44px;border-radius:13px}
  .card h3{font-size:15px}
  .card.featured h3{font-size:16px}
  .greeting h2{font-size:20px}
  .rank-item{padding:14px 16px}
  .rank-pos{width:40px;height:40px;font-size:18px}
  .rank-name{font-size:15px}
}
</style>
</head>
<body>

  <img src="https://i.ibb.co.com/xqrTSq0d/logo2.jpg" alt="Логотип" class="top-logo">
  <div>

      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>

          <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/>

          <rect x="1" y="3" width="15" height="13" rx="1"/><path d="M16 8h4l3 5v3h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/>

    <!-- Гарантия талон -->

          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/><path d="M9 15l2 2 4-4"/>

        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>

<script>
(function(){
  var sb=window.supabase&&window.supabase.createClient('https://jnuokhhqojlurvadcduv.supabase.co','sb_publishable_3l9NjY0Qadv3dJ9x3-t19w_8mKniZBk');
  if(!sb)return;
  sb.from('aiat_site_display').select('company_name,logo_url').eq('id',1).single().then(function(r){
    if(r.data&&r.data.company_name){var el=document.getElementById('companyName');if(el)el.textContent=r.data.company_name;}
    if(r.data&&r.data.logo_url){var img=document.querySelector('.top-logo');if(img)img.src=r.data.logo_url;}
  }).catch(function(){});
})();

var rankRestOpen=false;
function toggleRankRest(){
  rankRestOpen=!rankRestOpen;
  var rest=document.getElementById('rankRest');
  var icon=document.getElementById('rankToggleIcon');
  var text=document.getElementById('rankToggleText');
  if(rest){
    rest.classList.toggle('open',rankRestOpen);
    icon.style.transform=rankRestOpen?'rotate(180deg)':'rotate(0)';
    text.textContent=rankRestOpen?'Жасыру':'Қалғанды көру';
  }
}

async function loadRanking(sb){
  var wrap=document.getElementById('rankContent');
  var moreWrap=document.getElementById('rankMoreWrap');
  if(!wrap||!sb)return;
  try{
    var now=new Date();
    var monthStart=new Date(now.getFullYear(),now.getMonth(),1);
    var monthEnd=new Date(now.getFullYear(),now.getMonth()+1,0);
    var monthStartIso=monthStart.toISOString();
    var ordersR=await sb.from('aiat_orders').select('manager_id,price,price2').gte('created_at',monthStartIso);
    var mgrsR=await sb.from('aiat_site_managers').select('id,name');
    var rewards={};
    try{var rewardsR=await sb.from('aiat_ranking_rewards').select('rewards,top1_reward,top2_reward,top3_reward').eq('id',1).single();var d=rewardsR.data||{};rewards=d.rewards&&typeof d.rewards==='object'?d.rewards:{};if(Object.keys(rewards).length===0&&(d.top1_reward||d.top2_reward||d.top3_reward)){rewards={'1':d.top1_reward||'','2':d.top2_reward||'','3':d.top3_reward||''};}}catch(_){}
    var orders=ordersR.data||[];
    var mgrs=mgrsR.data||[];
    var byM={};
    orders.forEach(function(o){
      var id=o.manager_id;
      if(!byM[id])byM[id]={sum:0};
      byM[id].sum+=Number(o.price||0)+Number(o.price2||0);
    });
    var list=Object.keys(byM).map(function(id){
      var m=mgrs.find(function(x){return x.id==id;});
      return{id:id,name:m?m.name:'?',sum:byM[id].sum};
    }).sort(function(a,b){return b.sum-a.sum;});
    var periodEl=document.getElementById('rankPeriod');
    if(periodEl){
      var fmt=function(d){return ('0'+d.getDate()).slice(-2)+'.'+('0'+(d.getMonth()+1)).slice(-2)+'.'+d.getFullYear();};
      periodEl.innerHTML='<span>ОТ: '+fmt(monthStart)+'</span><span>—</span><span>ДО: '+fmt(monthEnd)+'</span>';
    }
    if(list.length===0){
      wrap.innerHTML='<div class="rank-empty">Осы айда деректер жоқ</div>';
      wrap.classList.remove('rank-load');
      return;
    }
    var top3=list.slice(0,3);
    var rest=list.slice(3);
    var posIcons=['<svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 5h-2V3H7v2H5c-1.1 0-2 .9-2 2v1c0 2.55 1.92 4.63 4.39 4.94-.63 1.5-1.02 2.77-1.06 4.06h2.01c.04-1.04.25-2.08.6-3.06-.66-.02-1.11-.44-.89-.75.65-.72 1.93-1.01 2.53-.73.2.1.3.35.25.57-.26 1.09-.66 2.08-1.17 3.01 1.04.17 2.28.26 3.53.26 1.25 0 2.49-.09 3.53-.26-.51-.93-.91-1.92-1.17-3.01-.05-.22.05-.47.25-.57.6-.28 1.88.01 2.53.73.22.31-.23.73-.89.75.35.98.56 2.02.6 3.06h2.01c-.04-1.29-.43-2.56-1.06-4.06 2.47-.31 4.39-2.39 4.39-4.94V7c0-1.1-.9-2-2-2zM5 8V7h2v3.82C5.84 10.4 5 9.3 5 8zm14 0c0 1.3-.84 2.4-2 2.82V7h2v1z"/></svg>','<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L9.19 8.63 2 9.24l5.46 4.73L5.82 21 12 17.27 18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2z"/></svg>','<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>'];
    function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
    function getReward(pos){var k=String(pos+1);return rewards[k]||'';}
    var top3Html=top3.map(function(r,i){
      var rw=getReward(i);
      var rew=rw?'<div class="rank-reward"><span class="rank-reward-label">Сыйлық:</span>'+esc(rw)+'</div>':'';
      var posHtml=i<3?'<div class="rank-pos">'+posIcons[i]+'</div>':'<div class="rank-pos">'+(i+1)+'</div>';
      return '<div class="rank-item">'+posHtml+'<div class="rank-body"><div class="rank-name">'+esc(r.name)+'</div>'+rew+'</div><div class="rank-sum">'+r.sum.toLocaleString()+' ₸</div></div>';
    }).join('');
    wrap.innerHTML='<div class="rank-top3">'+top3Html+'</div>';
    if(rest.length>0){
      moreWrap.style.display='flex';
      var restHtml=rest.map(function(r,i){
        var pos=i+4;
        var rw=getReward(pos-1);
        var rew=rw?'<div class="rank-reward"><span class="rank-reward-label">Сыйлық:</span>'+esc(rw)+'</div>':'';
        return '<div class="rank-item"><div class="rank-pos">'+pos+'</div><div class="rank-body"><div class="rank-name">'+esc(r.name)+'</div>'+rew+'</div><div class="rank-sum">'+r.sum.toLocaleString()+' ₸</div></div>';
      }).join('');
      var restDiv=document.createElement('div');
      restDiv.id='rankRest';
      restDiv.className='rank-rest';
      restDiv.innerHTML=restHtml;
      wrap.appendChild(restDiv);
    }else{
      moreWrap.style.display='none';
    }
    wrap.classList.remove('rank-load');
  }catch(e){
    wrap.innerHTML='<div class="rank-empty">Рейтинг жүктелмеді</div>';
    wrap.classList.remove('rank-load');
  }
}
(function(){
  var sb=window.supabase&&window.supabase.createClient('https://jnuokhhqojlurvadcduv.supabase.co','sb_publishable_3l9NjY0Qadv3dJ9x3-t19w_8mKniZBk');
  if(sb)loadRanking(sb);
})();
</script>
</body>
</html>
